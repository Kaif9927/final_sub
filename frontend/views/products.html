<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Products</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <nav class="top-nav">
          <a href="/vendors-list.html">Home</a>
          <a href="/cart.html">Cart</a>
          <a href="#" id="logout" class="nav-logout">Logout</a>
        </nav>
      </div>
    </header>
    <div class="wrap">
      <h1 id="title">Products</h1>
      <p id="vinfo" class="page-lead"></p>
      <div class="module-grid" id="grid"></div>
      <div class="err" id="err"></div>
    </div>
    <script src="/js/api-config.js"></script>

    <script src="/js/common.js"></script>
    <script>
      var params = new URLSearchParams(location.search);
      var vid = params.get("vendorId");
      redirectIfGuest().then(function (u) {
        if (!u) return;
        document.getElementById("logout").onclick = function (e) {
          e.preventDefault();
          fetch(apiUrl("/api/logout"), { method: "POST", credentials: "include" }).then(function () {
            location.href = "/";
          });
        };
        if (!vid) {
          document.getElementById("err").textContent = "Missing vendorId in URL.";
          return;
        }
        fetch(apiUrl("/api/shop/vendors/" + encodeURIComponent(vid)), { credentials: "include" })
          .then(function (r) {
            return r.json();
          })
          .then(function (d) {
            if (d.vendor) {
              document.getElementById("title").textContent = d.vendor.business_name;
              document.getElementById("vinfo").textContent =
                (d.vendor.category || "") + " · " + (d.vendor.contact_details || "");
            }
          });
        fetch(apiUrl("/api/shop/vendors/" + encodeURIComponent(vid) + "/products"), { credentials: "include" })
          .then(function (r) {
            return r.json();
          })
          .then(function (d) {
            var g = document.getElementById("grid");
            if (!d.products || !d.products.length) {
              g.innerHTML = "<p class='empty-state'>No products yet.</p>";
              return;
            }
            d.products.forEach(function (p) {
              var card = document.createElement("div");
              card.className = "card";
              card.style.display = "inline-block";
              card.style.width = "220px";
              card.style.marginRight = "12px";
              card.style.verticalAlign = "top";
              card.innerHTML =
                "<h3>" +
                p.name +
                "</h3><p>Rs " +
                p.price +
                "</p><img src='" +
                (p.image_url || "") +
                "' alt='' style='max-width:100%;height:90px;object-fit:cover' /><p><button type='button'>Add to Cart</button></p>";
              card.querySelector("button").onclick = function () {
                document.getElementById("err").textContent = "";
                if (u.role !== "user") {
                  document.getElementById("err").textContent = "Only customer accounts use the cart.";
                  return;
                }
                fetch(apiUrl("/api/shop/cart/items"), {
                  method: "POST",
                  credentials: "include",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ product_id: p.id, quantity: 1 })
                })
                  .then(function (r) {
                    return r.json();
                  })
                  .then(function (x) {
                    if (!x.ok) document.getElementById("err").textContent = x.message;
                    else alert("Added to cart");
                  });
              };
              g.appendChild(card);
            });
          });
      });
    </script>
  </body>
</html>
